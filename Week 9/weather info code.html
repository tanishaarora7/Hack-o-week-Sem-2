<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Weather Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

background:linear-gradient(270deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb);
background-size:800% 800%;
animation:bgmove 12s ease infinite;

display:flex;
justify-content:center;
align-items:center;

}

@keyframes bgmove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.wrap{
width:900px;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:white;
text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

.panel{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

/* glass cards */

.card{

background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);

border-radius:15px;
padding:20px;

color:white;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

transition:0.3s;

}

.card:hover{

transform:translateY(-8px) scale(1.03);

}

.city{

display:flex;
align-items:center;
gap:15px;

}

.icon{

font-size:45px;
animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}

}

.name{

font-size:18px;
font-weight:600;

}

.desc{

font-size:13px;
opacity:.9;

}

.temp{

font-size:38px;
font-weight:700;
margin:10px 0;

}

/* temperature bar */

.progress{

width:100%;
height:8px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
margin:10px 0;

}

.bar{

height:100%;
background:white;

}

.row{

display:flex;
justify-content:space-between;
font-size:14px;

}

.footer{

margin-top:20px;
text-align:center;
color:white;

}

button{

margin-top:10px;
padding:8px 14px;
border:none;
border-radius:8px;

background:white;
cursor:pointer;
font-weight:600;

}

button:hover{

background:#eee;

}

</style>
</head>

<body>

<div class="wrap">

<h1>🌦 Animated Weather Dashboard</h1>

<div class="panel" id="panel"></div>

<div class="footer">

<div id="updated">Updated: --</div>

<button onclick="renderPanel()">Refresh</button>

</div>

</div>

<script>

const weatherData=[

{city:"Mumbai",temp:30,condition:"Cloudy",humidity:70,wind:14,icon:"☁️"},

{city:"Delhi",temp:33,condition:"Sunny",humidity:40,wind:12,icon:"☀️"},

{city:"Pune",temp:26,condition:"Rain",humidity:80,wind:8,icon:"🌧️"}

];

let useCelsius=true;

function formatTemp(c){

if(useCelsius)return c+"°C";

return Math.round(c*9/5+32)+"°F";

}

function renderPanel(){

const panel=document.getElementById("panel");

panel.innerHTML="";

weatherData.forEach(w=>{

const card=document.createElement("div");

card.className="card";

const progress=(w.temp/40)*100;

card.innerHTML=`

<div class="city">

<div class="icon">${w.icon}</div>

<div>

<div class="name">${w.city}</div>

<div class="desc">${w.condition}</div>

</div>

</div>

<div class="temp">${formatTemp(w.temp)}</div>

<div class="progress">

<div class="bar" style="width:${progress}%"></div>

</div>

<div class="row">

<div>Humidity <b>${w.humidity}%</b></div>

<div>Wind <b>${w.wind} kph</b></div>

</div>

`;

panel.appendChild(card);

});

document.getElementById("updated").innerText=
"Updated: "+new Date().toLocaleString();

}

document.addEventListener("keydown",e=>{

if(e.key==="u"){

useCelsius=!useCelsius;

renderPanel();

}

});

renderPanel();

</script>

</body>
</html>
